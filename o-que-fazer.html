<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>O que fazer | Portal Ilha da Gigóia</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="o-que-fazer">
  <div class="progress" id="progress"></div>
  <header class="header" id="siteHeader"></header>

  <main>
    <section class="pageHead">
      <div class="container">
        <h1 class="reveal">O que fazer</h1>
        <p class="reveal">Um mix perfeito entre natureza, gastronomia e passeios. Escolha seu estilo e monte seu roteiro.</p>
      </div>
    </section>

    <section class="section" style="padding-top:24px">
      <div class="container">
        <div class="cards" id="pageCards"></div>
      </div>
    </section>

    <section class="section" id="natureza" style="padding-top:0">
      <div class="container">
        <h2 class="section__title reveal" style="text-align:left;font-size:34px">Natureza & Fauna</h2>
        <p class="section__subtitle reveal" style="text-align:left;margin-bottom:18px">Trilhas leves, observação de aves e paisagens para fotos incríveis.</p>
        <div class="cards" id="natureCards"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="siteFooter"></footer>
  <div id="gigiWidgetRoot"></div>
  <script src="app.js"></script>
</body>
</html>
