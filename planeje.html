<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monte seu Roteiro | Planeje sua Viagem | Ilha da Gigóia</title>

  <meta name="description" content="Monte seu roteiro personalizado para a Ilha da Gigóia. Escolha seus passeios e receba dicas e preços direto no seu WhatsApp." />
  <meta name="keywords" content="roteiro Ilha da Gigóia, planejar viagem, dicas turismo RJ, guia Barra da Tijuca" />
  <meta name="author" content="Portal Ilha da Gigóia" />
  <meta name="robots" content="index, follow" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Monte seu Roteiro | Portal Ilha da Gigóia" />
  <meta property="og:description" content="Selecione as opções que você quer fazer e receba um roteiro completo no WhatsApp." />
  <meta property="og:image" content="assets/hero.jpg" />
  <meta property="og:url" content="https://www.ilhadagigoia.com.br/planeje.html" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="planeje">
  <div class="progress" id="progress"></div>
  <header class="header" id="siteHeader"></header>

  <main>
    <section class="pageHead">
      <div class="container">
        <h1 class="reveal" data-i18n="pg_plan_h1">Monte seu roteiro</h1>
        <p class="reveal" data-i18n="pg_plan_p">Selecione as opções que você quer fazer. Ao enviar, pediremos seu número para te mandar o roteiro completo com preços e opções.</p>
      </div>
    </section>
    <section class="section" style="padding-top:24px">
      <div class="container">
        <div class="card reveal" style="padding:22px">
          <h2 class="section__title" style="text-align:left;font-size:28px;margin:0 0 12px" data-i18n="pg_plan_h2">Escolha suas opções</h2>
          <p class="section__subtitle" style="text-align:left;margin:0 0 18px" data-i18n="pg_plan_p2">Marque o que você quer fazer e clique em <strong>Enviar roteiro</strong>.</p>
          <form id="plannerForm" class="planner">
            <div class="planner__grid" id="plannerOptions"></div>
            <div class="planner__actions">
              <button class="btn btn--green" type="submit" data-i18n="btn_enviar">Enviar roteiro</button>
              <button class="btn" type="button" id="clearPlan" data-i18n="btn_limpar">Limpar</button>
            </div>
          </form>
          <div id="planFeedback" style="margin-top:16px"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" id="siteFooter"></footer>
  <div id="gigiWidgetRoot"></div>
  <script src="app.js"></script>
</body>
</html>
