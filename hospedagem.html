<body data-page="hospedagem">
  <div class="progress" id="progress"></div>
  
  <header class="header" id="siteHeader"></header>

  <main>
    <section class="pageHead">
      <div class="container" style="text-align: center;">
        <h1 class="reveal" data-i18n="nav_hospedagem">Hospedagem</h1>
        <p class="reveal" style="max-width: 700px; margin: 10px auto 0;" data-i18n="sub_hospedagem">Encontre o lugar perfeito para relaxar e aproveitar a ilha. De charmosas pousadas a casas inteiras de temporada.</p>
      </div>
    </section>

    <section class="section" style="padding-top:10px; padding-bottom: 0;">
      <div class="container">
        <div class="tipRow reveal" style="margin-bottom: 20px;">
          <div class="capi">
            <div class="capi__ring">
              <img id="capiImg" src="assets/capi.png" alt="Capi" />
            </div>
            <div class="capi__tag" id="tipTitle" data-i18n="tip_title">Dica do Capi:</div>
          </div>
          <div class="tip">
            <p id="tipText" style="color:var(--text); font-size:16px; line-height:1.6; font-weight:600; margin:0;"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="section" style="padding-top:24px">
      <div class="container">
        <div class="cards--4" id="pageCards"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="siteFooter"></footer>
  
  <div id="gigiWidgetRoot"></div>
<script src="cerebro-gigi.js"></script>
