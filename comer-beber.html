<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Onde Comer e Beber | Melhores Restaurantes | Ilha da Gigóia</title>

  <meta name="description" content="Onde comer na Ilha da Gigóia? Descubra os melhores restaurantes de frutos do mar e bares perfeitos para curtir o pôr do sol na lagoa." />
  <meta name="keywords" content="restaurantes Ilha da Gigóia, onde comer Ilha da Gigóia, bares, frutos do mar, pôr do sol" />
  <meta name="author" content="Portal Ilha da Gigóia" />
  <meta name="robots" content="index, follow" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Onde Comer e Beber | Restaurantes na Ilha da Gigóia" />
  <meta property="og:description" content="Os melhores restaurantes e bares para saborear frutos do mar frescos com vista para a lagoa." />
  <meta property="og:image" content="assets/card-comer.jpg" />
  <meta property="og:url" content="https://www.ilhadagigoia.com.br/comer-beber.html" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="comer-beber">
  <div class="progress" id="progress"></div>
  <header class="header" id="siteHeader"></header>

  <main>
    <section class="pageHead">
      <div class="container">
        <h1 class="reveal" data-i18n="pg_comer_h1">Comer & Beber</h1>
        <p class="reveal" data-i18n="pg_comer_p">Explore sabores locais: frutos do mar frescos, bares charmosos e aquele pôr do sol perfeito.</p>
      </div>
    </section>

    <section class="section" style="padding-top:10px; padding-bottom: 0;">
      <div class="container">
        <div class="tipRow reveal" style="margin-bottom: 20px;">
          <div class="capi">
            <div class="capi__ring">
              <img src="assets/capi.png" alt="Capi, seu guia" />
            </div>
            <div class="capi__tag" data-i18n="capi_tag">Capi, seu guia</div>
          </div>
          <div class="tip">
            <p style="color:var(--text); font-size:16px; line-height:1.6; font-weight:600; margin:0;">
              <span class="bulb" aria-hidden="true">💡</span>
              <strong data-i18n="tip_title">Dica da Capi:</strong>
              <span data-i18n="tip_comer"></span>
            </p>
          </div>
        </div>
      </div>
    </section>

    <section class="section" style="padding-top:24px">
      <div class="container">
        <div class="cards" id="pageCards"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="siteFooter"></footer>
  <div id="gigiWidgetRoot"></div>
  <script src="app.js"></script>
</body>
</html>
