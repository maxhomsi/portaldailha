<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
 <title>Onde Comer na Ilha da Gigóia: Melhores Restaurantes e Bares</title>
  <meta name="description" content="Guia gastronômico completo da Ilha da Gigóia, RJ. Encontre os melhores restaurantes de frutos do mar, bares, cafés e pizzarias com vista para a lagoa." />

  <meta name="description" content="Descubra os melhores restaurantes, bares e cafés da Ilha da Gigóia. Frutos do mar, drinks tropicais e o pôr do sol mais bonito do Rio de Janeiro." />
  <meta name="keywords" content="restaurantes Ilha da Gigóia, onde comer, bares, frutos do mar, café da manhã, Ilha da Gigóia RJ" />
  <meta name="author" content="Portal Ilha da Gigóia" />
  <meta name="robots" content="index, follow" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Onde Comer e Beber | Ilha da Gigóia" />
  <meta property="og:description" content="Saboreie a gastronomia local com vista para a lagoa. Opções para todos os gostos e momentos." />
  <meta property="og:image" content="assets/card-comer.jpg" />
  <meta property="og:url" content="https://www.ilhadagigoia.com.br/comer-beber.html" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="comer-beber">
  <div class="progress" id="progress"></div>
  
  <header class="header" id="siteHeader"></header>

  <main>
    <section class="pageHead">
      <div class="container" style="text-align: center;">
        <h1 class="reveal" data-i18n="title_comer_beber">Comer & Beber</h1>
        <p class="reveal" style="max-width: 700px; margin: 10px auto 0;" data-i18n="sub_comer_beber">Saboreie frutos do mar frescos, pratos da culinária carioca e aproveite os melhores drinks com vista para a lagoa.</p>
      </div>
    </section>

    <section class="section" style="padding-top:10px; padding-bottom: 0;">
      <div class="container">
        <div class="tipRow reveal" style="margin-bottom: 20px;">
          <div class="capi">
            <div class="capi__ring">
              <img id="capiImg" src="assets/capi.png" alt="Capi" />
            </div>
            <div class="capi__tag" id="tipTitle" data-i18n="tip_title">Dica do Capi:</div>
          </div>
          <div class="tip">
            <p id="tipText" style="color:var(--text); font-size:16px; line-height:1.6; font-weight:600; margin:0;"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="section" style="padding-top:24px">
      <div class="container">
        <div class="cards--4" id="pageCards"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="siteFooter"></footer>
  
  <div id="gigiWidgetRoot"></div>

  <script src="dicionario.js"></script>
  <script src="dicas-capi.js"></script>
  <script src="app.js"></script>

  <script>
    if (typeof initCapiTip === 'function') {
      initCapiTip();
    }
  </script>
