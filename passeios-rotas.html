<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passeios e Rotas de Barco | Ilha da Gigóia</title>

  <meta name="description" content="Confira os melhores passeios de barco e rotas na Ilha da Gigóia. Veja horários, paradas para fotos incríveis e dicas para aproveitar o Pantanal Carioca." />
  <meta name="keywords" content="passeio de barco Ilha da Gigóia, chalana, roteiro Ilha da Gigóia, Pantanal Carioca, fotos RJ" />
  <meta name="author" content="Portal Ilha da Gigóia" />
  <meta name="robots" content="index, follow" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Passeios e Rotas de Barco | Ilha da Gigóia" />
  <meta property="og:description" content="Descubra os melhores roteiros de barco pelo Pantanal Carioca. Paradas para fotos e vida selvagem." />
  <meta property="og:image" content="assets/card-passeios.jpg" />
  <meta property="og:url" content="https://www.ilhadagigoia.com.br/passeios-rotas.html" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="passeios-rotas">
  <div class="progress" id="progress"></div>
  <header class="header" id="siteHeader"></header>

  <main>
    <section class="pageHead">
      <div class="container">
        <h1 class="reveal" data-i18n="pg_passeios_h1">Passeios & Rotas</h1>
        <p class="reveal" data-i18n="pg_passeios_p">Roteiros de barco, paradas para fotos, horários ideais e dicas do que levar para aproveitar melhor.</p>
      </div>
    </section>

    <section class="section" style="padding-top:10px; padding-bottom: 0;">
      <div class="container">
        <div class="tipRow reveal" style="margin-bottom: 20px;">
          <div class="capi">
            <div class="capi__ring">
              <img src="assets/capi.png" alt="Capi" />
            </div>
            </div>
          <div class="tip">
            <p style="color:var(--text); font-size:16px; line-height:1.6; font-weight:600; margin:0;">
              <span class="bulb" aria-hidden="true">💡</span>
              <strong data-i18n="tip_title">Dica do Capi:</strong>
              <span data-i18n="tip_passeios"></span>
            </p>
          </div>
        </div>
      </div>
    </section>

    <section class="section" style="padding-top:24px">
      <div class="container">
        <div class="cards" id="pageCards"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="siteFooter"></footer>
  <div id="gigiWidgetRoot"></div>
  <script src="app.js"></script>
</body>
</html>
