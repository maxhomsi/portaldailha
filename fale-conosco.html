<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fale Conosco | Portal Ilha da Gigóia</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .contato-wrapper { display: flex; flex-wrap: wrap; gap: 40px; align-items: center; justify-content: center; margin-top: 30px; }
    .contato-form { flex: 1 1 400px; }
    .contato-img { flex: 1 1 350px; display: flex; justify-content: center; }
  </style>
</head>

<body data-page="fale-conosco">
  <div class="progress" id="progress"></div>
  <header class="header" id="siteHeader"></header>

  <main>
    <section class="container" style="padding: 60px 0 20px;">
        <h1 class="reveal" data-i18n="pg_fale_h1" style="font-size:48px; font-weight:900; margin:0;">Fale Conosco</h1>
        <p class="reveal" data-i18n="fc_intro" style="font-size:18px; color:var(--muted); font-weight:700; margin-top:10px;">Dúvidas, anúncios ou parcerias? Envie uma mensagem para nós.</p>
    </section>

    <section class="section">
      <div class="container">
        <div class="card reveal" style="padding: 40px;">
          <div class="contato-wrapper">
            <div class="contato-img">
               <img src="assets/gigi_faleconosco.png" alt="Gigi" class="gigi-mesa" style="max-width:450px;" />
            </div>
            <div class="contato-form">
              <form action="https://formsubmit.co/Ilhadagigoiaoficial@gmail.com" method="POST" class="gigiForm">
                <input type="hidden" name="_subject" value="Novo Contato - Portal Ilha da Gigóia">
                <input type="hidden" name="_captcha" value="false">

                <label data-i18n="fc_lbl_name">Seu nome</label>
                <input type="text" name="Nome" required />

                <label data-i18n="fc_lbl_email">Seu e-mail</label>
                <input type="email" name="Email" required />

                <label data-i18n="fc_lbl_phone">Telefone</label>
                <input type="tel" name="Telefone" />

                <label data-i18n="fc_lbl_msg">Mensagem</label>
                <textarea name="Mensagem" rows="5" required></textarea>

                <button class="gigiFab__btn" type="submit" style="width:100%; justify-content:center; background:var(--green); color:#fff; border:none;">
                  <span data-i18n="fc_btn_send">Enviar mensagem</span>
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" id="siteFooter"></footer>
  <div id="gigiWidgetRoot"></div>
  <script src="app.js"></script>
</body>
</html>
