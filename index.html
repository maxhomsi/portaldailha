<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Ilha da Gigóia</title>
  
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="home">
  
  <div class="progress" id="progress"></div>
  
  <header class="header" id="siteHeader"></header>

  <main>
    <section class="hero">
      <div class="hero__bg" id="heroBg"></div>
      <div class="hero__overlay"></div>
      <div class="hero__content container">
        
        <div class="pill reveal" id="heroPill">
          <span class="dot"></span>
          <span></span>
        </div>
        
        <h1 class="reveal" id="heroTitle"></h1>
        <p class="reveal" id="heroSubtitle"></p>
        
        <div class="hero__actions reveal" style="transition-delay: 200ms;">
          <a href="passeios-rotas.html" class="btn btn--green">Ver Passeios</a>
          <a href="a-ilha.html" class="btn">Conheça a Ilha</a>
        </div>

        <div class="hero__foot reveal" style="transition-delay: 300ms;">
          <span>✓</span>
          <span></span> 
        </div>
        
      </div>
    </section>

    <section class="section">
      <div class="container">
        
        <div class="tipRow reveal" style="margin-bottom: 60px;">
          <div class="capi">
            <div class="capi__ring">
              <img id="capiImg" src="" alt="Capi, O Guia" />
            </div>
            <div class="capi__tag" id="tipTitle"></div>
          </div>
          <div class="tip">
            <p id="tipText"></p>
          </div>
        </div>

        <h2 class="section__title reveal"></h2>
        <p class="section__subtitle reveal"></p>
        
        <div class="cards" id="homeCards"></div>
        
      </div>
    </section>

  </main>

  <footer class="footer" id="siteFooter"></footer>
  
  <div id="gigiWidgetRoot"></div>

  <script src="dicionario.js"></script>
  <script src="dicas-capi.js"></script>
  <script src="app.js"></script>

</body>
</html>
